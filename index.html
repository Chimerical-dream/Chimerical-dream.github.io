<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dmitry Sudarev</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My Game Development Journey</h1>
        <p style="font-size: 0.8rem; color: var(--text-color); margin-top: .5rem;"><span style="color: var(--muted-text-color); font-weight: 300;">(PUBLICLY RELEASED)</span> PROJECTS THAT I'M PROUD OF</p>
        <nav class="header-actions" aria-label="Portfolio links">
            <a href="https://t.me/nthropos" target="_blank" rel="noopener noreferrer" aria-label="Telegram" title="Telegram"><i class="fab fa-telegram"></i></a>
            <a href="https://www.linkedin.com/in/dmitry-sudarev-b21614225/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/Chimerical-dream" target="_blank" rel="noopener noreferrer" aria-label="GitHub" title="GitHub"><i class="fab fa-github"></i></a>
            <button class="pdf-download" type="button" aria-label="Download portfolio as PDF" title="Download PDF"><i class="fas fa-file-pdf"></i></button>
        </nav>
    </header>

    <main id="portfolio" class="container"></main>

    <div id="videoModal" class="modal" aria-hidden="true">
        <div class="modal-content">
            <button class="close" type="button" aria-label="Close video">&times;</button>
            <div class="video-container">
                <iframe title="Game video" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-links"></div>
                <div class="social-icons">
                    <a href="https://t.me/nthropos" target="_blank" rel="noopener noreferrer" aria-label="Telegram"><i class="fab fa-telegram"></i></a>
                    <a href="https://www.linkedin.com/in/dmitry-sudarev-b21614225/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
                    <a href="https://github.com/Chimerical-dream" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fab fa-github"></i></a>
                    <button id="downloadPdf" class="pdf-download" type="button" aria-label="Download portfolio as PDF" title="Download PDF"><i class="fas fa-file-pdf"></i></button>
                </div>
            </div>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="exporter.js"></script>
    <script>
        const portfolio = document.getElementById('portfolio');
        const modal = document.getElementById('videoModal');
        const modalIframe = modal.querySelector('iframe');

        function createElement(tagName, className, text) {
            const element = document.createElement(tagName);
            if (className) element.className = className;
            if (text) element.textContent = text;
            return element;
        }

        function createLink(href, className, iconClass, label) {
            const link = createElement('a', `game-link ${className}`);
            link.href = href;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            const icon = createElement('i', iconClass);
            link.append(icon, document.createTextNode(label));
            return link;
        }

        function getYoutubeId(link) {
            try {
                const url = new URL(link);
                if (url.hostname === 'youtu.be') return url.pathname.slice(1);
                return url.searchParams.get('v') || url.pathname.split('/').pop();
            } catch {
                return link;
            }
        }

        function createGameCard(game) {
            const card = createElement('article', 'game-card');
            const imageContainer = createElement('div', 'game-image-container');
            const image = createElement('img', 'game-image');
            image.src = game.ImageSrc;
            image.alt = game.Title;
            image.width = 300;
            image.height = 200;
            image.loading = 'lazy';
            imageContainer.append(image);

            const info = createElement('div', 'game-info');
            info.append(createElement('h3', 'game-title', game.Title));
            info.append(createElement('p', 'game-description', game.Description));

            const visibleGameSkills = game.Skills.filter(skill => skill !== 'Unity 3D' && skill !== 'C#');
            if (visibleGameSkills.length) {
                const techList = createElement('div', 'tech-list');
                visibleGameSkills.forEach(skill => techList.append(createElement('span', 'tech-tag', skill)));
                const technologies = createElement('div', 'technologies');
                technologies.append(techList);
                info.append(technologies);
            }

            info.append(createElement('p', 'timeline', game.TimePeriod));

            const links = createElement('div', 'game-links');
            if (game.YoutubeLink) {
                const youtubeLink = createElement('button', 'game-link youtube-link');
                youtubeLink.type = 'button';
                youtubeLink.setAttribute('aria-label', `Watch ${game.Title} video`);
                youtubeLink.dataset.youtubeId = getYoutubeId(game.YoutubeLink);
                youtubeLink.innerHTML = '<i class="fab fa-youtube"></i>';
                links.append(youtubeLink);
            }
            if (game.PlayLink) links.append(createLink(game.PlayLink, 'play-link', 'fas fa-play', 'Play'));
            if (game.AppMagicLink) links.append(createLink(game.AppMagicLink, 'appmagic-link', 'fas fa-chart-line', 'AppMagic'));
            if (game.RepositoryLink) links.append(createLink(game.RepositoryLink, 'github-link', 'fab fa-github', 'GitHub'));
            info.append(links);

            card.append(imageContainer, info);
            return card;
        }

        if (portfolioData.Skills.length) {
            const skillsSection = createElement('section', 'general-skills-section');
            skillsSection.append(createElement('h2', 'skills-title', 'Skills'));
            const skillsList = createElement('div', 'tech-list');
            portfolioData.Skills.forEach(skill => skillsList.append(createElement('span', 'tech-tag', skill)));
            skillsSection.append(skillsList);
            portfolio.append(skillsSection);
        }

        portfolioData.Companies.forEach(company => {
            const section = createElement('section', 'company-section');
            const header = createElement('div', 'company-header');
            header.append(createElement('h2', 'company-name', company.Title));
            if (company.TimePeriod) header.append(createElement('span', 'company-period', company.TimePeriod));
            if (company.Skills.length) {
                const companySkills = createElement('div', 'company-skills tech-list');
                company.Skills.forEach(skill => companySkills.append(createElement('span', 'tech-tag', skill)));
                header.append(companySkills);
            }
            const gameList = createElement('div', 'game-list');
            company.Games.forEach(game => gameList.append(createGameCard(game)));
            section.append(header, gameList);
            portfolio.append(section);
        });

        function closeModal() {
            modal.style.display = 'none';
            modal.setAttribute('aria-hidden', 'true');
            modalIframe.src = '';
        }

        document.addEventListener('click', event => {
            const youtubeButton = event.target.closest('.youtube-link');
            if (youtubeButton) {
                modalIframe.src = `https://www.youtube.com/embed/${youtubeButton.dataset.youtubeId}`;
                modal.style.display = 'block';
                modal.setAttribute('aria-hidden', 'false');
            }
            if (event.target.matches('.close') || event.target === modal) closeModal();
        });
    </script>
</body>
</html>
